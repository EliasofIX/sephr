name: SephrIOS
options:
  bundleIdPrefix: com.sephr
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true

schemes:
  Sephr:
    build:
      targets:
        Sephr: all
        SephrTests: [test]
    run:
      config: Debug
    test:
      targets:
        - SephrTests
    archive:
      config: Release

# Liquid AI's unified LEAP SDK — drives the on-device LFM2-VL-450M runtime
# behind SuperBrowse + Summarize. ModelManager.swift conditionally compiles
# against it (#if canImport(LeapSDK)) so the build still produces a usable
# mock backend if the dependency fails to resolve.
packages:
  LeapSDK:
    url: https://github.com/Liquid4All/leap-sdk.git
    from: "0.10.7"

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: minimal
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "3"
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGNING_REQUIRED: "NO"
    # Signing must be ALLOWED so entitlements embed when present; the simulator
    # ad-hoc signs with "-", device builds override identity/team on the
    # xcodebuild command line. ENABLE_DEBUG_DYLIB=NO keeps a single executable
    # so entitlements embed conventionally (the Xcode 16 debug-dylib split
    # scatters them into __preview.dylib and codesign reads empty).
    CODE_SIGNING_ALLOWED: "YES"
    ENABLE_DEBUG_DYLIB: "NO"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
    GENERATE_INFOPLIST_FILE: "NO"

targets:
  Sephr:
    type: application
    platform: iOS
    supportedDestinations: [iOS]
    sources:
      - path: Sources
      # xcodegen has no `resources:` key — resources live under `sources:` and
      # it auto-assigns the build phase by file type (.xcassets → Resources,
      # so actool compiles the app icon). Listing the catalog explicitly (not
      # the whole Resources/ dir) keeps Info.plist + *.entitlements out of the
      # bundle's resources.
      - path: Resources/Assets.xcassets
      - path: Resources/ublock-content-rules.json
        optional: true
    dependencies:
      - package: LeapSDK
    info:
      path: Resources/Info.plist
      properties:
        CFBundleIdentifier: com.sephr.ios
        CFBundleName: Sephr
        CFBundleDisplayName: Sephr
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UILaunchScreen:
          UIColorName: LaunchBackground
        UISupportedInterfaceOrientations~iphone:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIRequiresFullScreen: false
        LSRequiresIPhoneOS: true
        ITSAppUsesNonExemptEncryption: false
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
        LSApplicationQueriesSchemes:
          - http
          - https
        CFBundleURLTypes:
          - CFBundleURLName: com.sephr.ios.http
            CFBundleURLSchemes: [http, https]
    postBuildScripts:
      # Must run after Embed Frameworks, before the final app codesign.
      - name: Re-sign LeapSDK nested dylibs
        path: scripts/resign_leapsdk.sh
        inputFiles:
          - $(TARGET_BUILD_DIR)/$(FRAMEWORKS_FOLDER_PATH)/LeapSDK.framework/LeapSDK
        basedOnDependencyAnalysis: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sephr.ios
        TARGETED_DEVICE_FAMILY: "1,2"
        INFOPLIST_KEY_UIUserInterfaceStyle: Automatic
        SUPPORTS_MACCATALYST: "NO"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: Resources/Sephr.entitlements
        # Re-sign LeapSDK nested dylibs after embed — needs codesign access.
        ENABLE_USER_SCRIPT_SANDBOXING: "NO"

  SephrTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests/SephrTests
    dependencies:
      - target: Sephr
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sephr.ios.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Sephr.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Sephr"
        BUNDLE_LOADER: "$(TEST_HOST)"
